<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>N3280 Week 5 Midterm Practice Quiz</title>
<style>
  :root{
    --navy:#132A3A;
    --navy-deep:#0B1D29;
    --teal:#1C7293;
    --teal-light:#5FA8C9;
    --mint:#7FD1AE;
    --paper:#F6F8F9;
    --card:#FFFFFF;
    --ink:#16242E;
    --muted:#5A6B76;
    --wrong:#C4453A;
    --right:#2E8B57;
    --border:#E0E6E9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  .app{max-width:760px;margin:0 auto;padding:28px 18px 60px;}
  .masthead{
    background: linear-gradient(135deg, var(--navy-deep), var(--navy) 60%, var(--teal));
    border-radius:14px;
    padding:26px 24px;
    color:#fff;
    margin-bottom:22px;
    position:relative;
    overflow:hidden;
  }
  .masthead::after{
    content:"";
    position:absolute; right:-40px; top:-40px;
    width:160px;height:160px;border-radius:50%;
    background:rgba(127,209,174,0.15);
  }
  .masthead h1{margin:0 0 6px; font-size:1.5rem; letter-spacing:0.2px;}
  .masthead p{margin:0; color:#CFE3EA; font-size:0.92rem;}
  .pill-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;}
  .pill{
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:999px;
    padding:4px 12px;
    font-size:0.76rem;
    color:#EAF3F6;
  }

  #setup-screen .section-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0 22px;
  }
  .sec-card{
    background:var(--card); border:1.5px solid var(--border); border-radius:10px;
    padding:12px 14px; cursor:pointer; transition:.15s;
  }
  .sec-card:hover{border-color:var(--teal-light);}
  .sec-card.active{border-color:var(--teal); background:#EAF6F9;}
  .sec-card .num{font-size:0.72rem; color:var(--teal); font-weight:700; letter-spacing:0.5px;}
  .sec-card .name{font-size:0.86rem; font-weight:600; margin-top:2px;}
  .sec-card .count{font-size:0.74rem; color:var(--muted); margin-top:4px;}

  button.primary{
    background: var(--teal); color:#fff; border:none; border-radius:9px;
    padding:13px 20px; font-size:0.98rem; font-weight:600; cursor:pointer;
    width:100%; transition:.15s;
  }
  button.primary:hover{background:var(--navy);}
  button.ghost{
    background:transparent; color:var(--teal); border:1.5px solid var(--teal);
    border-radius:9px; padding:10px 18px; font-size:0.9rem; font-weight:600; cursor:pointer;
  }
  button.ghost:hover{background:#EAF6F9;}

  .quiz-card{
    background:var(--card); border-radius:14px; border:1px solid var(--border);
    padding:24px; box-shadow:0 2px 10px rgba(19,42,58,0.05);
  }
  .progress-track{
    height:6px; background:var(--border); border-radius:6px; overflow:hidden; margin-bottom:18px;
  }
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--teal), var(--mint)); transition:.3s;}
  .q-meta{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .q-tag{font-size:0.72rem; font-weight:700; color:var(--teal); letter-spacing:0.5px; text-transform:uppercase;}
  .q-count{font-size:0.78rem; color:var(--muted);}
  .q-text{font-size:1.08rem; line-height:1.5; margin:6px 0 18px; font-weight:600; color:var(--navy-deep);}
  .choice{
    display:block; width:100%; text-align:left; background:#fff;
    border:1.5px solid var(--border); border-radius:9px; padding:12px 14px;
    margin-bottom:9px; font-size:0.92rem; cursor:pointer; transition:.12s;
    color:var(--ink);
  }
  .choice:hover{border-color:var(--teal-light); background:#F7FBFC;}
  .choice.selected-right{border-color:var(--right); background:#EAF7EF; color:#1E5E3C;}
  .choice.selected-wrong{border-color:var(--wrong); background:#FBEAE8; color:#8C2E26;}
  .choice.reveal-right{border-color:var(--right); background:#EAF7EF; color:#1E5E3C;}
  .choice[disabled]{cursor:default;}
  .explain{
    margin-top:10px; padding:12px 14px; border-radius:9px; background:#F0F5F3;
    font-size:0.87rem; color:var(--muted); border-left:3px solid var(--teal); display:none;
  }
  .explain.show{display:block;}
  .nav-row{display:flex; justify-content:space-between; margin-top:20px; gap:10px;}

  #result-screen .quiz-card{text-align:center;}
  .score-circle{
    width:130px; height:130px; border-radius:50%; margin:14px auto 6px;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background: conic-gradient(var(--teal) calc(var(--pct) * 1%), var(--border) 0);
  }
  .score-circle-inner{
    width:104px; height:104px; border-radius:50%; background:#fff;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
  }
  .score-circle-inner .big{font-size:1.6rem; font-weight:800; color:var(--navy-deep);}
  .score-circle-inner .small{font-size:0.7rem; color:var(--muted);}
  .breakdown{text-align:left; margin-top:20px;}
  .breakdown-row{
    display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);
    font-size:0.86rem;
  }
  .missed-list{text-align:left; margin-top:16px;}
  .missed-item{
    background:#FBEAE8; border-radius:8px; padding:10px 12px; margin-bottom:8px; font-size:0.83rem;
  }
  .missed-item .qtxt{font-weight:600; color:#8C2E26; margin-bottom:3px;}
  .hidden{display:none;}
  .foot-note{text-align:center; color:var(--muted); font-size:0.74rem; margin-top:18px;}
</style>
</head>
<body>
<div class="app">

  <div class="masthead">
    <h1>N3280 Pathophysiology — Week 5 Practice Quiz</h1>
    <p>Section XV: Hematologic Pathophysiology</p>
    <div class="pill-row" id="pill-row"></div>
  </div>

  <div id="setup-screen">
    <div class="quiz-card">
      <p style="margin-top:0; color:var(--muted); font-size:0.9rem;">Pick which section(s) to practice, or leave all selected for a full mixed quiz.</p>
      <div class="section-grid" id="section-grid"></div>
      <button class="primary" id="start-btn">Start Quiz</button>
    </div>
  </div>

  <div id="quiz-screen" class="hidden">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="quiz-card">
      <div class="q-meta">
        <span class="q-tag" id="q-tag"></span>
        <span class="q-count" id="q-count"></span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div id="choices"></div>
      <div class="explain" id="explain"></div>
      <div class="nav-row">
        <button class="ghost" id="quit-btn">End Quiz</button>
        <button class="primary" id="next-btn" style="width:auto; display:none;">Next Question →</button>
      </div>

  </div>

  <div id="result-screen" class="hidden">
    <div class="quiz-card">
      <h2 style="margin-top:0;">Results</h2>
      <div class="score-circle" id="score-circle" style="--pct:0;">
        <div class="score-circle-inner">
          <div class="big" id="score-big">0%</div>
          <div class="small">score</div>
        </div>
      </div>
      <div id="score-line" style="color:var(--muted); font-size:0.9rem;"></div>
      <div class="breakdown" id="breakdown"></div>
      <div class="missed-list" id="missed-list"></div>
      <div class="nav-row">
        <button class="ghost" id="retake-btn">Retake Missed Only</button>
        <button class="primary" id="restart-btn" style="width:auto;">New Quiz</button>
      </div>
    </div>
  </div>

  <div class="foot-note">Based on N3280 Week 5 lecture content (Ch. 22-24) &amp; study guide. Good luck! 🩺</div>
</div>

<script>
const QUESTIONS = [
// ---- A. Blood Composition and Function ----
{sec:"A", tag:"Blood Composition", q:"Which plasma protein functions as a carrier and controls plasma oncotic pressure?", choices:["Fibrinogen","Albumin","Globulin","Erythropoietin"], correct:1, explain:"Albumin functions as a carrier and controls plasma oncotic pressure; globulins are carrier proteins/immunoglobulins, and fibrinogen is the main clotting protein."},
{sec:"A", tag:"Blood Composition", q:"Which blood cells are the most abundant and responsible for tissue oxygenation?", choices:["Leukocytes","Platelets","Erythrocytes","Lymphocytes"], correct:2, explain:"Erythrocytes (red blood cells) are the most abundant blood cells and are responsible for tissue oxygenation."},
{sec:"A", tag:"Blood Composition", q:"Which granulocyte is structurally and functionally similar to mast cells?", choices:["Neutrophils","Eosinophils","Basophils","Monocytes"], correct:2, explain:"Basophils are structurally and functionally similar to mast cells."},
{sec:"A", tag:"Blood Composition", q:"Once mature, monocytes make up the:", choices:["Mononuclear phagocyte system (MPS)","Reticuloendothelial network only","Lymphatic drainage system","Coagulation cascade"], correct:0, explain:"Mature monocytes (macrophages) make up the mononuclear phagocyte system (MPS), which sequesters and destroys aged erythrocytes and debris."},
{sec:"A", tag:"Blood Composition", q:"Which organ serves as a blood reservoir (storing about 300 mL) and destroys old/damaged blood cells via its venous sinuses?", choices:["Liver","Spleen","Thymus","Bone marrow"], correct:1, explain:"The spleen is the largest lymphoid organ; its venous sinuses carry out phagocytosis of old/damaged blood cells, and it stores about 300 mL of blood."},

// ---- B. Hematopoiesis ----
{sec:"B", tag:"Hematopoiesis", q:"Blood cell production occurring in tissues other than bone marrow (e.g., liver, spleen) after birth is called:", choices:["Medullary hematopoiesis","Extramedullary hematopoiesis","Myelopoiesis","Lymphopoiesis"], correct:1, explain:"Extramedullary hematopoiesis is blood cell production in tissues other than bone marrow after birth, and is usually a sign of disease."},
{sec:"B", tag:"Hematopoiesis", q:"What is the correct sequence of erythropoiesis?", choices:["Erythrocyte, reticulocyte, erythroblast, proerythroblast, progenitor cell","Progenitor cell, proerythroblast, erythroblast/normoblast, reticulocyte, erythrocyte","Progenitor cell, reticulocyte, erythroblast, erythrocyte","Erythroblast, progenitor cell, reticulocyte, erythrocyte"], correct:1, explain:"Erythropoiesis proceeds: progenitor cell → proerythroblast → erythroblast/normoblast → reticulocyte → erythrocyte, with hemoglobin increasing and the nucleus decreasing at each step."},
{sec:"B", tag:"Hematopoiesis", q:"Erythropoietin production increases in response to:", choices:["Tissue hypoxia","Hypervolemia","Increased serum calcium","Decreased leukocyte count"], correct:0, explain:"Erythropoietin is released via a feedback loop in response to tissue hypoxia, increasing red cell production."},
{sec:"B", tag:"Hematopoiesis", q:"Hemoglobin's iron must be in which state to bind oxygen?", choices:["Ferric (Fe3+)","Ferrous (Fe2+)","Elemental iron (Fe0)","Ferritin-bound"], correct:1, explain:"Heme iron must be in the reduced ferrous (Fe2+) state to bind oxygen; oxidized ferric (Fe3+) iron forms methemoglobin, which cannot bind oxygen."},
{sec:"B", tag:"Hematopoiesis", q:"Which protein controls the recycling of iron from senescent erythrocytes (the 'iron cycle')?", choices:["Ferritin","Transferrin","Hepcidin","Erythropoietin"], correct:2, explain:"The iron cycle — recycling iron from old erythrocytes for new hemoglobin synthesis — is controlled by the regulatory protein hepcidin."},
{sec:"B", tag:"Hematopoiesis", q:"Which of the following is NOT listed as a nutrient required for erythropoiesis?", choices:["Vitamin B12 and folic acid","Iron and copper","Vitamin C","Vitamin K"], correct:3, explain:"Erythropoiesis requires proteins/amino acids, vitamins B12/B6/B2/E/C, folic acid, pantothenic acid, niacin, and the minerals iron and copper — vitamin K is not listed among these (it is instead essential for clotting factor synthesis)."},

// ---- C. Hemostasis and Clotting ----
{sec:"C", tag:"Hemostasis", q:"The intrinsic clotting pathway is activated when:", choices:["Tissue thromboplastin is released by damaged endothelial cells","Factor XII (Hageman factor) contacts subendothelial substances exposed by vascular injury","Factor X is directly activated by platelets","Fibrinogen converts to fibrin"], correct:1, explain:"The intrinsic pathway is activated when factor XII (Hageman factor) contacts subendothelial substances exposed by vascular injury; the extrinsic pathway is activated by tissue thromboplastin release."},
{sec:"C", tag:"Hemostasis", q:"Both the intrinsic and extrinsic clotting pathways converge on the common pathway at which factor?", choices:["Factor VIII","Factor IX","Factor X","Factor XII"], correct:2, explain:"Both pathways converge on activation of factor X in the common pathway, proceeding to clot formation."},
{sec:"C", tag:"Hemostasis", q:"Lysis of blood clots is carried out by which system, converting plasminogen to plasmin?", choices:["The complement system","The fibrinolytic system","The kinin system","The renin-angiotensin system"], correct:1, explain:"The fibrinolytic system converts plasminogen to plasmin, which breaks down fibrin into fibrin degradation products."},
{sec:"C", tag:"Hemostasis", q:"Vitamin K deficiency impairs synthesis of which clotting factors/proteins?", choices:["Factor VIII and von Willebrand factor only","Prothrombin, factors VII/IX/X, and proteins C and S","Fibrinogen only","Platelet glycoproteins"], correct:1, explain:"Vitamin K is necessary for synthesis/regulation of prothrombin, the procoagulant factors VII, IX, and X, and the anticoagulant proteins C and S."},
{sec:"C", tag:"Hemostasis", q:"Which condition is the most common cause associated with disseminated intravascular coagulation (DIC)?", choices:["Sepsis","Vitamin K deficiency","Hemophilia A","Iron deficiency anemia"], correct:0, explain:"Sepsis is the most common condition associated with DIC, which involves widespread coagulation activation and simultaneous hemorrhage from excessive tissue factor exposure."},
{sec:"C", tag:"Hemostasis", q:"The Virchow triad, describing predisposing factors for thrombosis, includes vessel injury, hypercoagulability, and:", choices:["Abnormal blood flow","Vitamin K deficiency","Increased fibrinolysis","Decreased platelet count"], correct:0, explain:"The Virchow triad consists of injury to the vessel, abnormal blood flow, and hypercoagulability."},

// ---- D. Anemias and Red Blood Cell Disorders ----
{sec:"D", tag:"Anemias", q:"Anemia is defined as:", choices:["An increase in total leukocyte count","A reduction in total erythrocytes or in the quality/quantity of hemoglobin","An increase in platelet count above 400,000/mm3","A decrease in plasma volume only"], correct:1, explain:"Anemia is a reduction in the total number of circulating erythrocytes, or in the quality or quantity of hemoglobin."},
{sec:"D", tag:"Anemias", q:"Red blood cells present in various shapes (e.g., sickle cells, ovalocytes) describes:", choices:["Anisocytosis","Poikilocytosis","Polycythemia","Thrombocytosis"], correct:1, explain:"Poikilocytosis is red cells present in various shapes; anisocytosis is red cells present in various sizes."},
{sec:"D", tag:"Anemias", q:"Which anemia is caused by loss of intrinsic factor from gastric parietal cells, impairing vitamin B12 absorption?", choices:["Iron deficiency anemia","Folate deficiency anemia","Pernicious anemia","Anemia of chronic disease"], correct:2, explain:"Pernicious anemia is caused by loss of intrinsic factor (needed for B12 absorption), producing a megaloblastic (macrocytic) anemia with neurologic manifestations at more advanced stages."},
{sec:"D", tag:"Anemias", q:"Which anemia is similar to pernicious anemia in symptoms but generally does NOT cause neurologic manifestations?", choices:["Folate deficiency anemia","Iron deficiency anemia","Aplastic anemia","Sickle cell anemia"], correct:0, explain:"Folate deficiency anemia produces symptoms similar to pernicious anemia, but neurologic manifestations are generally not seen (unlike B12 deficiency)."},
{sec:"D", tag:"Anemias", q:"Koilonychia (spoon-shaped nails), cheilosis, and dysphagia are progressive manifestations of:", choices:["Pernicious anemia","Iron deficiency anemia","Aplastic anemia","Polycythemia vera"], correct:1, explain:"Progressive iron deficiency anemia causes koilonychia, cheilosis, stomatitis, painful oral ulcerations, and dysphagia."},
{sec:"D", tag:"Anemias", q:"Anemia of chronic disease (anemia of inflammation) results from all of the following EXCEPT:", choices:["Decreased erythrocyte life span","Suppressed erythropoietin production","Altered iron metabolism in macrophages","Increased bone marrow response to erythropoietin"], correct:3, explain:"Anemia of chronic disease results from decreased erythrocyte life span, suppressed erythropoietin production, INEFFECTIVE (not increased) bone marrow response to erythropoietin, and altered iron metabolism in macrophages."},
{sec:"D", tag:"Anemias", q:"Hematopoietic failure/bone marrow aplasia causing pancytopenia describes:", choices:["Hemolytic anemia","Aplastic anemia","Polycythemia vera","Anemia of chronic disease"], correct:1, explain:"Aplastic anemia is hematopoietic failure or bone marrow aplasia, causing reduced production of mature cells (pancytopenia)."},
{sec:"D", tag:"Anemias", q:"Polycythemia vera is caused by an acquired mutation in which gene?", choices:["BRCA1","JAK2","TP53","HFE"], correct:1, explain:"Polycythemia vera is caused by an acquired mutation in the JAK2 gene, causing increased intracellular stimulation of cell division and overproduction of blood cells."},
{sec:"D", tag:"Anemias", q:"Relative polycythemia is caused by:", choices:["A true increase in red cell mass from chronic hypoxia","Hemoconcentration from dehydration","A JAK2 gene mutation","An erythropoietin-secreting tumor"], correct:1, explain:"Relative polycythemia is hemoconcentration from dehydration — fluid loss causes relative increases in red cell counts, Hgb, and Hct without a true increase in red cell mass."},

// ---- E. White Blood Cell Disorders ----
{sec:"E", tag:"WBC Disorders", q:"An abnormally LOW leukocyte count (<4000 cells/μL), which is never a normal finding, is called:", choices:["Leukocytosis","Leukopenia","Granulocytosis","Lymphocytosis"], correct:1, explain:"Leukopenia is an abnormally low leukocyte count, never normal, associated with decreased neutrophils and increased infection risk."},
{sec:"E", tag:"WBC Disorders", q:"When neutrophil demand exceeds supply and immature neutrophils are released from bone marrow, this is called:", choices:["Shift-to-the-right","Shift-to-the-left","Basophilia","Monocytosis"], correct:1, explain:"A 'shift-to-the-left' describes release of immature neutrophils when demand exceeds supply; when the population normalizes, this is a 'shift-to-the-right.'"},
{sec:"E", tag:"WBC Disorders", q:"Lymphocytosis is most commonly caused by acute viral infection with which virus?", choices:["Epstein-Barr virus (EBV)","Influenza virus","Rhinovirus","Herpes zoster virus"], correct:0, explain:"Lymphocytosis is caused by acute viral infections, particularly Epstein-Barr virus (EBV) — the same virus responsible for most cases of infectious mononucleosis."},
{sec:"E", tag:"WBC Disorders", q:"Infectious mononucleosis diagnosis requires which laboratory finding?", choices:[">50% lymphocytes with at least 10% atypical lymphocytes","Platelet count <150,000/mm3","JAK2 gene mutation","Presence of Reed-Sternberg cells"], correct:0, explain:"Diagnosis of infectious mononucleosis requires >50% lymphocytes with at least 10% atypical lymphocytes, plus a positive Monospot test or EBV antibodies."},
{sec:"E", tag:"WBC Disorders", q:"What is the most common cause of death from infectious mononucleosis (though rare overall)?", choices:["Splenic rupture","Myocarditis","Encephalitis","Hepatic failure"], correct:0, explain:"Serious complications of infectious mononucleosis are rare, but splenic rupture is the most common cause of death when it occurs."},
{sec:"E", tag:"WBC Disorders", q:"Which leukemia is characterized by too many lymphoblasts and occurs mostly in children?", choices:["Acute myelogenous leukemia (AML)","Acute lymphocytic leukemia (ALL)","Chronic myelogenous leukemia (CML)","Chronic lymphocytic leukemia (CLL)"], correct:1, explain:"Acute lymphocytic leukemia (ALL) involves too many lymphoblasts and occurs mostly in children."},
{sec:"E", tag:"WBC Disorders", q:"Which is the most common adult leukemia?", choices:["Acute lymphocytic leukemia (ALL)","Acute myelogenous leukemia (AML)","Chronic lymphocytic leukemia (CLL)","Hairy cell leukemia"], correct:1, explain:"Acute myelogenous leukemia (AML) is the most common adult leukemia; chronic lymphocytic leukemia (CLL) is the most common adult leukemia specifically in the western world among CHRONIC leukemias."},
{sec:"E", tag:"WBC Disorders", q:"Diagnosis of Hodgkin lymphoma requires the presence of which cell type?", choices:["Blast cells","Reed-Sternberg cells","Schistocytes","Megakaryocytes"], correct:1, explain:"Reed-Sternberg (RS) cells — malignant transformed lymphocytes — are necessary for diagnosing Hodgkin lymphoma, though not specific to it alone."},
{sec:"E", tag:"WBC Disorders", q:"Which lymphoma classically progresses predictably from one group of lymph nodes to another and can usually be cured with early treatment?", choices:["Non-Hodgkin lymphoma","Hodgkin lymphoma","Burkitt lymphoma","Multiple myeloma"], correct:1, explain:"Hodgkin lymphoma is malignant and progresses from one group of lymph nodes to another; adult Hodgkin lymphoma can usually be cured with early diagnosis and treatment."},
{sec:"E", tag:"WBC Disorders", q:"Multiple myeloma is a malignant proliferation of which cell type, producing lytic bone lesions?", choices:["Plasma cells","B lymphocytes (immature)","Megakaryocytes","Neutrophils"], correct:0, explain:"Multiple myeloma is a malignant proliferation of plasma cells that infiltrate bone marrow and form tumor masses, producing lytic bone lesions, hypercalcemia, renal failure, and anemia."},
{sec:"E", tag:"WBC Disorders", q:"Multiple myeloma is typically preceded by which condition?", choices:["Monoclonal gammopathy of undetermined significance (MGUS)","Polycythemia vera","Infectious mononucleosis","Aplastic anemia"], correct:0, explain:"Multiple myeloma is typically preceded by monoclonal gammopathy of undetermined significance (MGUS)."},

// ---- F. Platelet and Bleeding Disorders ----
{sec:"F", tag:"Platelet Disorders", q:"At which platelet count does spontaneous bleeding typically begin to occur?", choices:["<150,000/mm3","<100,000/mm3","<50,000/mm3","<15,000/mm3"], correct:3, explain:"Spontaneous bleeding typically occurs below 15,000/mm3; bleeding from minor trauma occurs below 50,000/mm3, and severe bleeding occurs below 10,000/mm3."},
{sec:"F", tag:"Platelet Disorders", q:"Heparin-induced thrombocytopenia (HIT) is caused by:", choices:["IgG antibodies targeting the heparin-platelet factor 4 complex","Direct heparin toxicity to megakaryocytes","A JAK2 gene mutation","Vitamin K deficiency"], correct:0, explain:"HIT is an adverse drug reaction caused by IgG antibodies targeting the heparin-platelet factor 4 complex, typically causing a 50% drop in platelet count; treatment is withdrawing heparin."},
{sec:"F", tag:"Platelet Disorders", q:"Chronic immune (idiopathic) thrombocytopenic purpura (ITP) involves:", choices:["An IgG autoantibody targeting platelet glycoproteins","A JAK2 gene mutation","Decreased megakaryocyte production only","Vitamin K deficiency"], correct:0, explain:"Chronic ITP involves an IgG autoantibody that targets platelet glycoproteins; antibody-coated platelets are then sequestered and removed from circulation."},
{sec:"F", tag:"Platelet Disorders", q:"Thrombotic thrombocytopenic purpura (TTP) is best described as:", choices:["A thrombotic microangiopathy where platelets aggregate to form microthrombi","A deficiency of vitamin K-dependent clotting factors","An inherited coagulation factor mutation","A malignant proliferation of plasma cells"], correct:0, explain:"TTP is a thrombotic microangiopathy in which platelets aggregate and form microthrombi, occluding arterioles and capillaries."},
{sec:"F", tag:"Platelet Disorders", q:"Essential (primary) thrombocythemia is classified as which type of disorder?", choices:["An autoimmune disorder","A myeloproliferative neoplasm involving a bone marrow megakaryocyte progenitor cell defect","A vitamin deficiency disorder","An inherited coagulation factor deficiency"], correct:1, explain:"Essential (primary) thrombocythemia is a myeloproliferative neoplasm involving a defect in bone marrow megakaryocyte progenitor cells, causing excess platelet production."},

// ---- G. Pediatric Hematologic Disorders ----
{sec:"G", tag:"Pediatric Heme", q:"In hemolytic disease of the fetus and newborn, which incompatibility accounts for the LARGER share of cases?", choices:["Rh incompatibility (>50%)","ABO incompatibility (20-25%)","HLA incompatibility","Platelet antigen incompatibility"], correct:1, explain:"ABO incompatibility accounts for 20-25% of hemolytic disease of the fetus and newborn cases; Rh incompatibility accounts for less than 10%."},
{sec:"G", tag:"Pediatric Heme", q:"Bilirubin deposition in the brain, a severe complication of hemolytic disease of the newborn, is called:", choices:["Kernicterus","Icterus neonatorum","Erythroblastosis","Hydrops fetalis"], correct:0, explain:"Kernicterus is bilirubin deposition in the brain, a severe complication of hemolytic disease of the fetus and newborn; icterus neonatorum refers to newborn jaundice generally."},
{sec:"G", tag:"Pediatric Heme", q:"In sickle cell disease, hemoglobin S results from which amino acid substitution?", choices:["Valine replaces glutamic acid","Glutamic acid replaces valine","Lysine replaces arginine","Glycine replaces alanine"], correct:0, explain:"In hemoglobin S, one amino acid (valine) replaces another (glutamic acid) in the beta-globin chain, causing the molecule to stretch/elongate under deoxygenation/dehydration."},
{sec:"G", tag:"Pediatric Heme", q:"A child who inherits Hb S from one parent and Hb A from the other has:", choices:["Sickle cell disease","Sickle cell trait","Beta-thalassemia major","Hemoglobin H disease"], correct:1, explain:"Sickle cell trait occurs when a child inherits Hb S from one parent and Hb A (normal) from the other."},
{sec:"G", tag:"Pediatric Heme", q:"Which is NOT one of the four types of sickle cell crisis?", choices:["Vaso-occlusive crisis","Aplastic crisis","Hemolytic uremic crisis","Sequestration crisis"], correct:2, explain:"The four types of sickle cell crisis are vaso-occlusive (thrombotic), aplastic, sequestration, and hyperhemolytic crisis — hemolytic uremic crisis is a distinct, unrelated condition."},
{sec:"G", tag:"Pediatric Heme", q:"Beta-thalassemia major is also known as:", choices:["Cooley anemia","Hydrops fetalis","Hemoglobin H disease","Alpha trait"], correct:0, explain:"Beta-thalassemia major (Cooley anemia) is a life-threatening form of beta thalassemia from homozygous inheritance."},
{sec:"G", tag:"Pediatric Heme", q:"Which alpha thalassemia form is associated with hydrops fetalis and is fatal?", choices:["Alpha trait","Alpha-thalassemia minor","Hemoglobin H disease","Alpha-thalassemia major"], correct:3, explain:"Alpha-thalassemia major is a fatal condition associated with hydrops fetalis, the most severe of the four alpha thalassemia forms."},
{sec:"G", tag:"Pediatric Heme", q:"Hemophilia A results from a deficiency in which clotting factor?", choices:["Factor VIII","Factor IX","Factor XI","Factor X"], correct:0, explain:"Hemophilia A is a factor VIII deficiency; hemophilia B is factor IX deficiency; hemophilia C is factor XI deficiency."},
{sec:"G", tag:"Pediatric Heme", q:"Primary immune thrombocytopenia in children, the most common platelet consumption disorder, has what prognosis?", choices:["Poor, with <20% recovery","Excellent, with 80-90% regaining normal counts within 6 months","Universally fatal without splenectomy","Requires lifelong factor replacement"], correct:1, explain:"Primary immune thrombocytopenia in children has an excellent prognosis, with 80-90% of children regaining normal platelet counts within 6 months of onset."},
{sec:"G", tag:"Pediatric Heme", q:"What is the hallmark cell of acute childhood leukemia?", choices:["Reed-Sternberg cell","Blast cell","Schistocyte","Megakaryocyte"], correct:1, explain:"The blast cell (undifferentiated/immature cell) is the hallmark of acute leukemia, reflected in manifestations of bone marrow failure like pallor, fatigue, and bleeding."},
{sec:"G", tag:"Pediatric Heme", q:"In childhood Hodgkin lymphoma, which virus is frequently involved?", choices:["Epstein-Barr virus (EBV)","Cytomegalovirus (CMV)","HIV","Hepatitis B virus"], correct:0, explain:"Epstein-Barr virus (EBV) is frequently involved in childhood Hodgkin lymphoma, which classically presents with painless lymphadenopathy and Reed-Sternberg cells."},
];

const SECTIONS = [
  {id:"A", name:"Blood Composition & Function", num:"A"},
  {id:"B", name:"Hematopoiesis", num:"B"},
  {id:"C", name:"Hemostasis & Clotting", num:"C"},
  {id:"D", name:"Anemias & RBC Disorders", num:"D"},
  {id:"E", name:"White Blood Cell Disorders", num:"E"},
  {id:"F", name:"Platelet & Bleeding Disorders", num:"F"},
  {id:"G", name:"Pediatric Hematologic Disorders", num:"G"},
];

let activeSections = new Set(SECTIONS.map(s=>s.id));
let quizQueue = [];
let current = 0;
let answers = [];
let missedQueue = [];

const pillRow = document.getElementById('pill-row');
pillRow.innerHTML = `<span class="pill">${QUESTIONS.length} total questions</span><span class="pill">3 topic areas</span>`;

function renderSetup(){
  const grid = document.getElementById('section-grid');
  grid.innerHTML = '';
  SECTIONS.forEach(s=>{
    const count = QUESTIONS.filter(q=>q.sec===s.id).length;
    const div = document.createElement('div');
    div.className = 'sec-card' + (activeSections.has(s.id) ? ' active' : '');
    div.innerHTML = `<div class="num">SECTION ${s.num}</div><div class="name">${s.name}</div><div class="count">${count} questions</div>`;
    div.onclick = ()=>{
      if(activeSections.has(s.id)){ activeSections.delete(s.id); } else { activeSections.add(s.id); }
      renderSetup();
    };
    grid.appendChild(div);
  });
}
renderSetup();

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

document.getElementById('start-btn').onclick = ()=>{
  let pool = QUESTIONS.filter(q=>activeSections.has(q.sec));
  if(pool.length===0) pool = QUESTIONS.slice();
  quizQueue = shuffle(pool);
  current = 0;
  answers = [];
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  showQuestion();
};

function showQuestion(){
  const q = quizQueue[current];
  document.getElementById('progress-fill').style.width = ((current)/quizQueue.length*100)+'%';
  document.getElementById('q-tag').textContent = q.tag;
  document.getElementById('q-count').textContent = `Question ${current+1} of ${quizQueue.length}`;
  document.getElementById('q-text').textContent = q.q;
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  const explainDiv = document.getElementById('explain');
  explainDiv.classList.remove('show');
  explainDiv.textContent = '';
  document.getElementById('next-btn').style.display = 'none';

  q.choices.forEach((choiceText, idx)=>{
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = choiceText;
    btn.onclick = ()=> selectAnswer(idx);
    choicesDiv.appendChild(btn);
  });
}

function selectAnswer(idx){
  const q = quizQueue[current];
  const buttons = document.querySelectorAll('#choices .choice');
  buttons.forEach(b=> b.disabled = true);
  const isCorrect = idx === q.correct;
  buttons[idx].classList.add(isCorrect ? 'selected-right' : 'selected-wrong');
  if(!isCorrect){ buttons[q.correct].classList.add('reveal-right'); }
  const explainDiv = document.getElementById('explain');
  explainDiv.textContent = q.explain;
  explainDiv.classList.add('show');
  answers.push({question:q.q, tag:q.tag, sec:q.sec, chosen:idx, correctIdx:q.correct, isCorrect, choices:q.choices});
  document.getElementById('next-btn').style.display = 'inline-block';
  document.getElementById('next-btn').textContent = (current === quizQueue.length-1) ? 'See Results →' : 'Next Question →';
}

document.getElementById('next-btn').onclick = ()=>{
  current++;
  if(current >= quizQueue.length){
    showResults();
  } else {
    showQuestion();
  }
};

document.getElementById('quit-btn').onclick = ()=>{
  if(answers.length===0){
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('setup-screen').classList.remove('hidden');
  } else {
    showResults();
  }
};

function showResults(){
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');

  const correctCount = answers.filter(a=>a.isCorrect).length;
  const total = answers.length;
  const pct = total ? Math.round(correctCount/total*100) : 0;

  document.getElementById('score-circle').style.setProperty('--pct', pct);
  document.getElementById('score-big').textContent = pct+'%';
  document.getElementById('score-line').textContent = `${correctCount} of ${total} correct`;

  const breakdown = document.getElementById('breakdown');
  breakdown.innerHTML = '<h3 style="margin-bottom:6px;">By Section</h3>';
  SECTIONS.forEach(s=>{
    const secAnswers = answers.filter(a=>a.sec===s.id);
    if(secAnswers.length===0) return;
    const secCorrect = secAnswers.filter(a=>a.isCorrect).length;
    const row = document.createElement('div');
    row.className = 'breakdown-row';
    row.innerHTML = `<span>${s.name}</span><span>${secCorrect}/${secAnswers.length}</span>`;
    breakdown.appendChild(row);
  });

  const missed = answers.filter(a=>!a.isCorrect);
  missedQueue = missed;
  const missedList = document.getElementById('missed-list');
  missedList.innerHTML = '';
  if(missed.length){
    const h = document.createElement('h3');
    h.textContent = 'Review Missed Questions';
    h.style.marginBottom = '8px';
    missedList.appendChild(h);
    missed.forEach(m=>{
      const div = document.createElement('div');
      div.className = 'missed-item';
      div.innerHTML = `<div class="qtxt">${m.question}</div><div>Correct answer: ${m.choices[m.correctIdx]}</div>`;
      missedList.appendChild(div);
    });
  }
  document.getElementById('retake-btn').style.display = missed.length ? 'inline-block' : 'none';
}

document.getElementById('retake-btn').onclick = ()=>{
  const missedQs = QUESTIONS.filter(q => missedQueue.some(m=>m.question===q.q));
  quizQueue = shuffle(missedQs);
  current = 0;
  answers = [];
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  showQuestion();
};

document.getElementById('restart-btn').onclick = ()=>{
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
  renderSetup();
};
</script>
</body>
</html>
